name: Build LiCIK Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Select device to build'
        required: true
        default: 'surya'
        type: choice
        options:
          - surya
          - santoni
          - all

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event.inputs.device }}" == "all" ]]; then
            echo 'matrix={"include":[{"device":"surya"},{"device":"santoni"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"device":"${{ github.event.inputs.device }}"}]}' >> $GITHUB_OUTPUT
          fi

  build_kernel:
    name: Build LiCIK Kernel for ${{ matrix.device }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    permissions:
      contents: write

    steps:
    - name: Checkout Workflow & Local Configs
      uses: actions/checkout@v4

    - name: Set Variables
      run: |
        echo "DATE=$(TZ=Asia/Jakarta date +%Y%m%d%H%M)" >> $GITHUB_ENV
        echo "ARTIFACT=$GITHUB_WORKSPACE/artifact" >> $GITHUB_ENV
        if [[ "${{ matrix.device }}" == "surya" ]]; then
          echo "KERNEL_URL=https://github.com/crdroidandroid/android_kernel_xiaomi_surya.git" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=16.0" >> $GITHUB_ENV
        elif [[ "${{ matrix.device }}" == "santoni" ]]; then
          echo "KERNEL_URL=PASTE_SANTONI_URL_HERE" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=PASTE_SANTONI_BRANCH_HERE" >> $GITHUB_ENV
        fi

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y device-tree-compiler bc build-essential flex bison libssl-dev libelf-dev clang lld wget python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi zip
        mkdir -p ${{ env.ARTIFACT }}

    - name: Fetch Kernel Source
      run: |
        git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_URL }} kernel_workspace

    - name: Cache Toolchain
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: kernel_workspace/tc/clang-498229
        key: ${{ runner.os }}-toolchain-v17

    - name: Cache AnyKernel3
      id: cache-ak3
      uses: actions/cache@v4
      with:
        path: kernel_workspace/android/AnyKernel3
        key: ${{ runner.os }}-ak3-shinigami

    - name: Apply Droidspaces Patches
      run: |
        cd kernel_workspace
        URLS=(
          "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/non-GKI/01.fix_kernel_panic_in_xt_qtaguid.patch"
          "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/non-GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch"
        )
        for url in "${URLS[@]}"; do
          wget -q "$url"
        done
        for p in *.patch; do
          echo "Applying $p..."
          patch -p1 --forward --batch < "$p" || echo "Failed or already applied: $p"
        done

    - name: Setup Droidspaces Configs
      run: |
        mkdir -p kernel_workspace/arch/arm64/configs/
        cp configs/droidspaces.config kernel_workspace/arch/arm64/configs/
        cp configs/droidspaces-additional.config kernel_workspace/arch/arm64/configs/ || true

    - name: Patch Kernel Source
      run: |
        chmod +x patch/buildpatchCR.sh
        ./patch/buildpatchCR.sh kernel_workspace/build.sh ${{ matrix.device }}

    - name: Building
      run: |
        cd kernel_workspace
        chmod +x build.sh
        ./build.sh

    - name: Extract Metadata
      id: metadata
      run: |
        cd kernel_workspace
        VERSION=$(grep "^VERSION =" Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep "^PATCHLEVEL =" Makefile | awk '{print $3}')
        SUBLEVEL=$(grep "^SUBLEVEL =" Makefile | awk '{print $3}')
        EXTRAVERSION=$(grep "^EXTRAVERSION =" Makefile | awk '{print $3}')
        echo "KV=$VERSION.$PATCHLEVEL.$SUBLEVEL$EXTRAVERSION" >> $GITHUB_OUTPUT
        # Extract owner from URL
        OWNER=$(echo "${{ env.KERNEL_URL }}" | sed -E 's/.*github.com\/([^\/]+).*/\1/')
        echo "OWNER=$OWNER" >> $GITHUB_OUTPUT

    - name: Move ZIP to Artifact
      run: |
        mv kernel_workspace/*.zip ${{ env.ARTIFACT }}/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LiCIK-${{ matrix.device }}-${{ env.DATE }}
        path: ${{ env.ARTIFACT }}/*

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ matrix.device }}-${{ env.DATE }}
        files: ${{ env.ARTIFACT }}/*
        body: |
          ## LiCIK Kernel for ${{ matrix.device }}

          **Author:** ${{ steps.metadata.outputs.OWNER }}
          **Kernel Source:** ${{ env.KERNEL_URL }}
          **Kernel Version:** ${{ steps.metadata.outputs.KV }}
          **Build Date:** ${{ env.DATE }}
